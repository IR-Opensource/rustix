name: Rust CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses: invisirisk/pse-action@feature/intermediate-deno-rust-ca-devtest
        with:
          api_url: "https://app.stage.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
          mode: docker-intercept
          pse_image_tag: "dev-test"
          debug: true
      # ============= InvisiRisk Setup End =============
          
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Install/build dependencies from Cargo.toml
      - name: Build project
        run: cargo build

     # Install global cargo tools
      - name: Install cargo packages
        run: |
          cargo install cargo-edit
          cargo install cargo-watch
          cargo install ripgrep

    # ============= InvisiRisk Cleanup =============
      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@feature/intermediate-deno-rust-ca-devtest
        with:
          cleanup: "true"
      # ============= InvisiRisk Cleanup End =============
